<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisição Inválida - Tracen Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-tracen {
            background-color: #6741d9;
        }

        .text-tracen {
            color: #6741d9;
        }

        .hover-tracen:hover {
            background-color: #5634b8;
        }

        /* Animações */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes slide-in-right {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-fade-in-down {
            animation: fadeInDown 0.6s ease-out;
        }

        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        .animate-slide-in-right {
            animation: slide-in-right 0.8s ease-out;
        }

        .error-card {
            animation: fadeInDown 0.6s ease-out;
        }

        .countdown {
            font-size: 3rem;
            font-weight: 800;
            color: #ca8a04;
            animation: pulse-glow 1s infinite;
        }

        .button-group {
            animation: slide-in-right 0.8s ease-out 0.2s both;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-yellow-50 via-white to-yellow-50 flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Decoração de fundo -->
    <div
        class="absolute top-0 right-0 w-96 h-96 bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse">
    </div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-yellow-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"
        style="animation-delay: 2s;"></div>

    <div class="relative z-10 w-full max-w-2xl px-4">
        <!-- Card Principal -->
        <div class="error-card bg-white rounded-3xl shadow-2xl border-2 border-yellow-100 p-8 md:p-12">

            <!-- Cabeçalho com Ícone -->
            <div class="text-center mb-10">
                <!-- Ícone 400 Animado -->
                <div class="flex justify-center mb-6">
                    <div class="relative">
                        <div
                            class="text-7xl md:text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-700 animate-bounce">
                            400
                        </div>
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                            <svg class="w-20 h-20 md:w-32 md:h-32 text-yellow-400 animate-spin opacity-30"
                                style="animation-duration: 8s;" fill="currentColor" viewBox="0 0 20 20">
                                <path
                                    d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </div>

                <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-3 animate-fade-in-down">
                    Requisição Inválida
                </h1>
                <p class="text-gray-500 text-lg mb-2 animate-fade-in-down" style="animation-delay: 0.1s;">
                    Desculpe! Há um erro na sua requisição.
                </p>
                <p class="text-gray-400 text-sm animate-fade-in-down" style="animation-delay: 0.2s;">
                    Os dados enviados são inválidos ou incompletos. Verifique e tente novamente.
                </p>
            </div>

            <!-- Ícone Decorativo -->
            <div class="flex justify-center mb-8">
                <svg class="w-16 h-16 md:w-20 md:h-20 text-yellow-400 animate-bounce" style="animation-delay: 0.2s;"
                    fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd"></path>
                </svg>
            </div>

            <!-- Botões de Ação -->
            <div class="button-group flex gap-4 justify-center">
                <a href="/"
                    class="px-6 py-3 bg-gradient-to-r from-yellow-500 to-yellow-600 text-white rounded-2xl font-bold hover:from-yellow-600 hover:to-yellow-700 transition-all shadow-lg shadow-yellow-300 active:scale-95">
                    Voltar para Início
                </a>
                <a href="javascript:history.back()"
                    class="px-6 py-3 bg-gray-200 text-gray-800 rounded-2xl font-bold hover:bg-gray-300 transition-all active:scale-95">
                    Voltar
                </a>
            </div>

            <!-- Footer Info -->
            <div class="mt-10 pt-6 border-t border-gray-200 text-center">
                <p class="text-gray-500 text-xs md:text-sm">
                    📞 Precisa de ajuda? Entre em contato com o suporte.
                </p>
            </div>
        </div>
    </div>
</body>

</html>
