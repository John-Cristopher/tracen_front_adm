<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracen Academy - Acesso Staff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-tracen {
            background-color: #6741d9;
        }

        .text-tracen {
            color: #6741d9;
        }

        .bg-rose-tracen {
            background-color: #e11d48;
        }

        .text-rose-tracen {
            color: #e11d48;
        }

        .toast-error {
            animation: slideInUp 0.3s ease-out;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(100px);
                opacity: 0;
            }
        }

        .toast-exit {
            animation: slideOut 0.3s ease-in;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-purple-50 via-white to-purple-50 flex items-center justify-center min-h-screen relative overflow-hidden">
    <!-- Decoração de fundo -->
    <div
        class="absolute top-0 right-0 w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse">
    </div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"
        style="animation-delay: 2s;"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <!-- Card Principal -->
        <div
            class="bg-white rounded-3xl shadow-2xl border-2 border-transparent hover:border-purple-200 transition-all p-8">
            <!-- Cabeçalho -->
            <div class="text-center mb-10">
                <div class="flex justify-center mb-4">
                    <div class="bg-gradient-to-br from-purple-600 to-purple-700 p-4 rounded-2xl">
                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z">
                            </path>
                        </svg>
                    </div>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Acesso Staff</h1>
                <p class="text-gray-500 text-sm">Painel Administrativo</p>
            </div>

            <!-- Formulário -->
            <form id="staffForm" class="space-y-4 mb-8">
                <!-- Usuário Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Usuário Administrativo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path>
                                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path>
                            </svg>
                        </span>
                        <input type="text" id="usernameInput" placeholder="admin" required
                            class="w-full pl-12 pr-4 py-3 border-2 border-gray-300 rounded-2xl focus:border-tracen focus:ring-2 focus:ring-purple-200 outline-none transition-all bg-gray-50 hover:bg-white">
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                    clip-rule="evenodd"></path>
                            </svg>
                        </span>
                        <input type="password" id="passwordInput" placeholder="••••••••" required
                            class="w-full pl-12 pr-12 py-3 border-2 border-gray-300 rounded-2xl focus:border-tracen focus:ring-2 focus:ring-purple-200 outline-none transition-all bg-gray-50 hover:bg-white">
                        <button type="button" id="togglePassword"
                            class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-tracen">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                                <path fill-rule="evenodd"
                                    d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                                    clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Checkbox Lembrar -->
                <label class="flex items-center gap-2 text-sm text-gray-600 hover:text-gray-800 cursor-pointer">
                    <input type="checkbox"
                        class="w-4 h-4 rounded border-gray-300 text-tracen focus:ring-tracen transition-colors">
                    <span>Lembrar-me neste dispositivo</span>
                </label>

                <!-- Botão Login -->
                <button type="submit"
                    class="w-full py-3 mt-6 bg-gradient-to-r from-purple-600 to-purple-700 text-white rounded-2xl font-bold hover:from-purple-700 hover:to-purple-800 transition-all shadow-lg shadow-purple-300 active:scale-95">
                    Entrar no Painel
                </button>
            </form>

        </div>

        <!-- Info -->
        <div class="mt-6 text-center text-xs text-gray-500">
            <p>⚠️ Área Restrita - Acesso apenas a administradores</p>
        </div>
    </div>

    <!-- Toast de Erro -->
    <div id="errorToast"
        class="hidden fixed bottom-6 left-6 right-6 max-w-sm mx-auto toast-error bg-rose-tracen text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-50">
        <svg class="w-6 h-6 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"></path>
        </svg>
        <span id="errorMessage" class="font-medium flex-1">Email ou senha inválidos.</span>
    </div>

    <script src="../assets/api-handler.js"></script>
    <script src="../assets/staff-login.js"></script>
</body>

</html>
